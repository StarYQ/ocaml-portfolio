<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arnab bhowmik</title>
    <script>
        (function() {
            var theme = 'dark';
            try {
                var storedTheme = window.localStorage && window.localStorage.getItem('theme');
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    theme = storedTheme;
                }
            } catch (_) {}
            document.documentElement.classList.add(theme + '-theme');
        })();
    </script>
    <style>
        @font-face {
            font-family: 'JetBrains Mono';
            font-style: normal;
            font-weight: 100 800;
            font-display: swap;
            src: url('static/fonts-jetbrains-mono-latin.woff2') format('woff2');
        }

        :root, .light-theme {
            --bg-primary: #f5f2ea;
            --text-primary: #111111;
            --border-strong: rgba(17, 17, 17, 0.72);
        }

        .dark-theme {
            --bg-primary: #0f0f10;
            --text-primary: #f4f1ea;
            --border-strong: rgba(244, 241, 234, 0.8);
        }

        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-primary);
        }
        
        /* Loading styles */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-strong);
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-primary);
            background: var(--bg-primary);
        }
        
        /* App container */
        #app {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #app.loaded {
            opacity: 1;
        }
        
        /* Responsive design helpers */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loading">Loading arnab bhowmik...</div>
    <div id="app"></div>
    
    <script>
        // Show the app once loaded
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loading = document.getElementById('loading');
                const app = document.getElementById('app');
                
                if (loading) loading.style.display = 'none';
                if (app) app.classList.add('loaded');
            }, 100);
        });
    </script>
    
    <!-- Load the compiled OCaml/Bonsai JavaScript -->
    <script>
        // Detect if we're running on GitHub Pages or locally
        const isGitHubPages = window.location.hostname === 'staryq.github.io';
        const basePath = isGitHubPages ? '/ocaml-portfolio' : '';
        const script = document.createElement('script');
        script.src = basePath + '/_build/default/lib/client_main/main.bc.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
