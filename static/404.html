<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arnab bhowmik</title>
    <script>
        (function() {
            var theme = 'dark';
            try {
                var storedTheme = window.localStorage && window.localStorage.getItem('theme');
                if (storedTheme === 'light' || storedTheme === 'sunset' || storedTheme === 'dark') {
                    theme = storedTheme;
                }
            } catch (_) {}
            document.documentElement.classList.add(theme + '-theme');
        })();
    </script>
    <style>
        :root, .light-theme {
            --bg-primary: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
        }

        .dark-theme {
            --bg-primary: #0f0f10;
            --text-primary: #f4f1ea;
            --text-secondary: rgba(244, 241, 234, 0.7);
        }

        .sunset-theme {
            --bg-primary: oklch(0.18 0.02 45);
            --text-primary: oklch(0.85 0.08 55);
            --text-secondary: oklch(0.6 0.05 50);
        }

        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-primary);
        }
        
        /* Loading styles */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            color: var(--text-secondary);
        }
        
        /* App container */
        #app {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        #app.loaded {
            opacity: 1;
        }
        
        /* Responsive design helpers */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="loading">Loading arnab bhowmik...</div>
    <div id="app"></div>
    
    <script>
        // Show the app once loaded
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                const loading = document.getElementById('loading');
                const app = document.getElementById('app');
                
                if (loading) loading.style.display = 'none';
                if (app) app.classList.add('loaded');
            }, 100);
        });
    </script>
    
    <!-- Load the compiled OCaml/Bonsai JavaScript -->
    <script>
        // Detect if we're running on GitHub Pages or locally
        const isGitHubPages = window.location.hostname === 'staryq.github.io';
        const basePath = isGitHubPages ? '/ocaml-portfolio' : '';
        const script = document.createElement('script');
        script.src = basePath + '/_build/default/lib/client_main/main.bc.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
